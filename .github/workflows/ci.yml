name: CI

# Runs the same gates as the local workflow (CLAUDE.md "Build and verification
# workflow") on every pull request and on pushes to main, so PRs gain a
# required status check.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (svelte-check)
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit
